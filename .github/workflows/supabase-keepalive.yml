name: Supabase Keepalive

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY repository secret."
            exit 1
          fi

          response_file="$(mktemp)"
          status="$(
            curl --silent --show-error --location \
              --max-time 30 \
              --retry 3 \
              --retry-delay 10 \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              "${SUPABASE_URL}/rest/v1/profiles?select=id&limit=1"
          )"

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "Supabase keepalive failed with HTTP ${status}."
            cat "${response_file}"
            exit 1
          fi

          echo "Supabase keepalive OK (HTTP ${status})."

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Bars a Bruz - Supabase keepalive failed"
          to: enzo.sounou@live.fr
          from: ${{ secrets.SMTP_FROM }}
          body: |
            The daily Supabase keepalive check failed.

            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
